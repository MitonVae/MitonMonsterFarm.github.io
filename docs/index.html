<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>怪兽农场 Wiki</title>
  <meta name="description" content="《怪兽农场》完整游戏机制 Wiki —— 建筑、怪兽、作物、探索、科技全解析">
  <link rel="icon" href="../favicon.ico" type="image/x-icon">

  <!-- Docsify 主题：night-owl 暗色 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <style>
    :root {
      --theme-color: #46d164;
      --base-font-size: 15px;
      --base-line-height: 1.8;
      --sidebar-width: 260px;
      --sidebar-background: #0d1117;
      --sidebar-nav-link-color: #8b949e;
      --sidebar-nav-link-color--active: #46d164;
      --sidebar-nav-link-color--hover: #e6edf3;
      --sidebar-nav-link-font-weight--active: 600;
      --cover-background-color: #0d1117;
      --content-max-width: 860px;
      --code-theme-background: #161b22;
    }
    body { background: #0d1117; color: #e6edf3; }

    /* 顶栏 */
    .app-nav { background: #161b22; border-bottom: 1px solid #21262d; }
    .app-nav a { color: #8b949e !important; }
    .app-nav a:hover { color: #46d164 !important; }

    /* 侧栏分组标题（Docsify 将 **粗体** 渲染为 li > strong 或 li > p > strong）*/
    .sidebar-nav > ul > li > strong,
    .sidebar-nav > ul > li > p > strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #484f58 !important;
      margin: 20px 0 4px 0;
      padding: 0 4px;
      pointer-events: none;
      user-select: none;
    }
    /* 分组标题所在的 li 不作为可点击项 */
    .sidebar-nav > ul > li:has(> strong),
    .sidebar-nav > ul > li:has(> p > strong) {
      cursor: default;
    }

    /* 搜索框 */
    .search input {
      background: #21262d !important;
      border-color: #30363d !important;
      color: #e6edf3 !important;
    }
    .search input::placeholder { color: #8b949e !important; }
    .search .results-panel { background: #161b22 !important; border-color: #30363d !important; }
    .search .matching-post h2 { color: #46d164 !important; }

    /* 代码块 */
    pre { background: #161b22 !important; border: 1px solid #21262d; border-radius: 8px; }

    /* 表格 */
    table { border-collapse: collapse; width: 100%; }
    thead { background: #161b22; }
    th { color: #8b949e; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; }
    tr:nth-child(even) { background: #161b22; }
    td, th { border: 1px solid #21262d; padding: 8px 12px; }

    /* 稀有度标签 */
    .tag {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }
    .tag-common    { background: #1f3a1f; color: #46d164; border: 1px solid #46d164; }
    .tag-uncommon  { background: #1a2840; color: #58a6ff; border: 1px solid #58a6ff; }
    .tag-rare      { background: #2a1f3a; color: #bc8cff; border: 1px solid #bc8cff; }
    .tag-epic      { background: #3a1a1a; color: #f85149; border: 1px solid #f85149; }
    .tag-legendary { background: #3a2e00; color: #f0c53d; border: 1px solid #f0c53d; }

    /* 版本徽章 */
    .badge {
      display: inline-block;
      background: #1f3a1f;
      border: 1px solid #46d164;
      color: #46d164;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* callout 提示框 */
    .tip, .warning, .danger, .info {
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px 0;
      border-left: 4px solid;
    }
    .tip     { background: #1f3a1f; border-color: #46d164; color: #c9d1d9; }
    .warning { background: #3a2e00; border-color: #f0c53d; color: #c9d1d9; }
    .danger  { background: #3a1a1a; border-color: #f85149; color: #c9d1d9; }
    .info    { background: #1a2840; border-color: #1f6feb; color: #c9d1d9; }

    /* 内容区域 */
    .content { padding: 30px 40px; }
    @media (max-width: 768px) { .content { padding: 16px; } }

    /* 页脚 */
    .docsify-pagination-container { border-top: 1px solid #21262d; margin-top: 40px; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    /* ── 自动判断是否运行在 GitHub Pages 环境或本地环境 ── */
    var _isGhPages = location.hostname.indexOf('github.io') !== -1;
    var _isLocal = location.protocol === 'file:';
    var _basePath  = _isGhPages ? '/MonsterFarm/wiki/' : './';

    window.$docsify = {
      name: '🌾 怪兽农场 Wiki',
      nameLink: _isGhPages ? '/MonsterFarm/wiki/' : './',
      basePath: _basePath,
      // 在本地运行时不使用相对路径，防止404错误
      relativePath: !_isLocal,
      repo: 'https://github.com/MitonVae/MonsterFarm',
      loadSidebar: '_sidebar.md',
      loadNavbar: false,
      subMaxLevel: 3,
      auto2top: true,
      // 本地文件模式
      requestHeaders: {
        'cache-control': 'no-cache'
      },

      // 搜索插件
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜索 Wiki…',
        noData: '未找到相关内容',
        depth: 4,
        hideOtherSidebarContent: false,
      },

      // 分页
      pagination: {
        previousText: '← 上一页',
        nextText: '下一页 →',
        crossChapter: true,
      },

      // 字数统计
      count: {
        countable: ['p','li','blockquote'],
        language: 'chinese',
        position: 'bottom',
        color: '#8b949e',
      },

      // 代码高亮复制按钮
      copyCode: {
        buttonText: '复制',
        errorText:  '错误',
        successText:'已复制',
      },

      // 顶部进度条
      progress: {
        position: 'top',
        color: '#46d164',
        height: '3px',
      },

      plugins: [
        // 外链新标签打开
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('a[href^="http"]').forEach(function(a) {
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener');
            });
          });
        }
      ]
    };
  </script>

  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 搜索 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <!-- 复制按钮 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <!-- 分页 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 外部链接图标 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-external-link-icon/dist/docsify-plugin-external-link-icon.min.js"></script>
</body>
</html>
